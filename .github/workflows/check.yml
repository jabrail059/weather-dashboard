name: Check
on: push
jobs:
    lint:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v7
            - name: Install deps
              run: go mod tidy
            - name: Golangci-lint
              uses: golangci/golangci-lint-action@v9
              with:
                version: v2.12
    test:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v7
        - name: Install deps
          run: go mod tidy
        - name: Test
          run: go test ./...