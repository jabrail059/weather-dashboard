name: Check
on: push
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25.6'
      - name: Install deps
        run: go mod download
      - name: Golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12
  test:
    needs: [lint]
    strategy:
      matrix:
        version: ['1.25.6', '1.26.5']
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.version }} 
      - name: Install deps
        run: go mod tidy
      - name: Test
        run: go test ./...