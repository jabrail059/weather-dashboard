<div class="hourly-grid">
    {{range .Hours}}
        <div class="hourly-card">
            <ol>
                <h4>{{ .Time}}</h4>
                <strong class="hourly-temp" style="text-align: center;">{{ .Temperature }}℃</strong>
                <img src="{{ .ImageSource }}" alt="">
            </ol>
        </div>
    {{end}}
</div>
